<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prix du Marché - KA Farm</title>

  <!-- Favicon & Branding -->
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">

  <!-- Tailwind CSS CDN & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#06130B',
              slate: '#0B2112',
              green: '#10B981',
              hover: '#059669',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-50 dark:bg-[#061109] text-slate-800 dark:text-slate-100 min-h-screen">

  <!-- Mobile Top Header Placeholder -->
  <div id="mobile-header-placeholder"></div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content Stage -->
    <main class="flex-1 min-w-0 p-4 md:p-8 overflow-y-auto">
      <div class="w-full space-y-6">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 text-left">
          <div class="space-y-1">
            <span class="text-[10px] text-orange-500 font-extrabold uppercase tracking-widest">Analyse de Marché</span>
            <h2 class="text-2xl font-black text-slate-850 dark:text-white flex items-center gap-2">
              <i data-lucide="trending-up" class="h-6 w-6 text-orange-500"></i> Prix du Marché
            </h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold">
              Suivi des prix en temps réel et analyse des tendances saisonnières. (En construction)
            </p>
          </div>
        </div>

        <div
          class="p-10 bg-white dark:bg-[#0B2112]/20 border border-slate-100 dark:border-[#143E23]/30 rounded-3xl text-center">
          <i data-lucide="construction" class="h-12 w-12 text-orange-500 mx-auto mb-4"></i>
          <h3 class="text-lg font-bold text-slate-800 dark:text-white">Page en cours de développement</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Cette fonctionnalité de suivi des prix du marché
            sera bientôt disponible.</p>
        </div>

      </div>
    </main>
  </div>

  <!-- Shared App & Module Entry Points -->
  <script type="module" src="/js/router.js"></script>
  <script type="module" src="/js/app.js"></script>

</body>

</html>
