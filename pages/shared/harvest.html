<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal des Récoltes - KA Farm</title>

  <!-- Favicon & Branding -->
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">

  <!-- Tailwind CSS CDN & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom separated Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dashboard.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#06130B',
              slate: '#0B2112',
              green: '#10B981',
              hover: '#059669',
            }
          }
        }
      }
    }
  </script>
</head>

<body
  class="bg-slate-50 dark:bg-[#061109] text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200">

  <!-- Mobile Top Header Placeholder -->
  <div id="mobile-header-placeholder"></div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content Stage -->
    <main class="flex-1 min-w-0 p-4 md:p-8 overflow-y-auto">
      <div class="w-full max-w-6xl mx-auto space-y-6">

        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 text-left">
          <div class="space-y-1">
            <span class="text-[10px] text-emerald-500 font-extrabold uppercase tracking-widest">Données
              d'Exploitation</span>
            <h2 class="text-2xl font-black text-slate-850 dark:text-white flex items-center gap-2">
              <i data-lucide="sprout" class="h-6 w-6 text-emerald-500"></i> Journal des Récoltes
            </h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold">
              Historique complet de toutes les récoltes effectuées sur l'exploitation.
            </p>
          </div>
          <button id="btn-add-harvest"
            class="px-4 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black rounded-xl shadow-lg shadow-emerald-950/20 flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 cursor-pointer">
            <i data-lucide="plus-circle" class="h-4 w-4"></i>
            <span>Ajouter une Récolte</span>
          </button>
        </div>

        <!-- Harvests Table -->
        <div
          class="bg-white dark:bg-[#0B2112] border border-slate-100 dark:border-[#143E23]/30 rounded-3xl shadow-lg overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left text-xs">
              <thead class="bg-slate-50 dark:bg-[#061109]/30">
                <tr>
                  <th class="p-4 font-black text-slate-500 dark:text-[#819888] uppercase tracking-wider">Culture</th>
                  <th class="p-4 font-black text-slate-500 dark:text-[#819888] uppercase tracking-wider">Parcelle</th>
                  <th class="p-4 font-black text-slate-500 dark:text-[#819888] uppercase tracking-wider">Quantité (kg)
                  </th>
                  <th class="p-4 font-black text-slate-500 dark:text-[#819888] uppercase tracking-wider">Date de Récolte
                  </th>
                  <th class="p-4 font-black text-slate-500 dark:text-[#819888] uppercase tracking-wider">Qualité</th>
                  <th class="p-4 font-black text-slate-500 dark:text-[#819888] uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody id="harvests-table-body" class="divide-y divide-slate-100 dark:divide-[#143E23]/20">
                <!-- Les lignes de données seront injectées ici par JavaScript -->
                <tr id="loading-row">
                  <td colspan="6" class="p-8 text-center text-slate-400 font-semibold">
                    <div class="flex items-center justify-center gap-2">
                      <i data-lucide="loader" class="h-4 w-4 animate-spin"></i>
                      <span>Chargement des récoltes...</span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Harvest Modal -->
  <div id="harvest-modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div
        class="bg-white dark:bg-[#0B2112] border border-slate-100 dark:border-[#143E23]/30 rounded-3xl shadow-2xl w-full max-w-lg">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-black text-slate-800 dark:text-white">Ajouter une récolte</h3>
            <button id="btn-close-harvest-modal" class="text-slate-400 hover:text-rose-500 cursor-pointer">
              <i data-lucide="x" class="h-5 w-5"></i>
            </button>
          </div>
          <form id="harvest-form" class="space-y-4">
            <div>
              <label
                class="block text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-1">Culture</label>
              <select id="harvest-crop"
                class="w-full rounded-xl border border-slate-200 dark:border-[#143E23]/40 bg-slate-50 dark:bg-[#061109] px-3 py-2 text-xs">
                <option value="">Sélectionner une culture</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label
                  class="block text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-1">Date
                  de récolte</label>
                <input type="date" id="harvest-date"
                  class="w-full rounded-xl border border-slate-200 dark:border-[#143E23]/40 bg-slate-50 dark:bg-[#061109] px-3 py-2 text-xs" />
              </div>
              <div>
                <label
                  class="block text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-1">Quantité
                  (kg)</label>
                <input type="number" id="harvest-quantity" min="0" step="0.1"
                  class="w-full rounded-xl border border-slate-200 dark:border-[#143E23]/40 bg-slate-50 dark:bg-[#061109] px-3 py-2 text-xs" />
              </div>
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-1">Qualité</label>
              <select id="harvest-quality"
                class="w-full rounded-xl border border-slate-200 dark:border-[#143E23]/40 bg-slate-50 dark:bg-[#061109] px-3 py-2 text-xs">
                <option value="A">A - Premium</option>
                <option value="B" selected>B - Standard</option>
                <option value="C">C - Second</option>
              </select>
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-1">Notes</label>
              <textarea id="harvest-notes" rows="3"
                class="w-full rounded-xl border border-slate-200 dark:border-[#143E23]/40 bg-slate-50 dark:bg-[#061109] px-3 py-2 text-xs"></textarea>
            </div>
            <div class="flex justify-end gap-2 pt-2">
              <button type="button" id="btn-cancel-harvest"
                class="px-4 py-2 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-[#143E23]/30 cursor-pointer">Annuler</button>
              <button type="submit"
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black rounded-xl cursor-pointer">Enregistrer</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared App & Page-specific Module Entry Points -->
  <script type="module" src="/js/router.js"></script>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/modules/harvests.js"></script>
</body>

</html>
