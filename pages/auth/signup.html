<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - KA Farm Sénégal</title>

  <!-- SEO & Branding -->
  <meta name="description"
    content="Créez votre compte collaborateur sur KA Farm Sénégal et commencez à gérer l'exploitation agro-écologique en temps réel.">
  <link rel="canonical" href="https://kafarm.sn/pages/auth/signup.html">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">

  <!-- Tailwind CSS CDN & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom separated Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/auth.css">

  <script>
    try {
      const dark = localStorage.getItem('ka_farm_dark_mode') !== 'false';
      if (dark) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
      }
    } catch (e) { }

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#06130B',
              slate: '#0B2112',
              green: '#10B981',
              hover: '#059669',
            }
          }
        }
      }
    }
  </script>
</head>

<body
  class="bg-slate-50 dark:bg-[#061109] text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

  <div
    class="w-full max-w-md bg-white dark:bg-[#0B2112] border border-slate-200 dark:border-[#143E23] rounded-3xl p-8 space-y-6 auth-card shadow-xl dark:shadow-none animate-scaleUp">
    <!-- Header -->
    <div class="text-center space-y-3">
      <div
        class="inline-flex h-16 w-16 bg-[#06130B]/20 dark:bg-white/5 p-1.5 rounded-2xl border border-emerald-500/30 items-center justify-center">
        <svg class="w-full h-full" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield Outlines -->
          <path d="M50 12 C70 12, 82 15, 82 34 C82 52, 70 66, 50 75 C30 66, 18 52, 18 34 C18 15, 30 12, 50 12 Z"
            stroke="#10b981" stroke-width="2" stroke-linejoin="round" fill="none" />
          <path d="M50 15 C67 15, 78 18, 78 34 C78 50, 67 63, 50 71 C33 63, 22 50, 22 34 C22 18, 33 15, 50 15 Z"
            stroke="#10b981" stroke-width="0.8" stroke-linejoin="round" fill="none" />

          <!-- "KA" Outline -->
          <path d="M29 29 V46 M29 37 L38 29 M32 39 L39 46" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M44 46 L49 29 L54 46 M46 41 H52" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"
            stroke-linejoin="round" />

          <!-- Sprout Icon -->
          <path d="M59 46 H71" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
          <path d="M65 46 V39" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
          <path d="M65 39 C61 39, 58 36, 58 33 C58 30, 61 29, 65 33 C65 33, 65 39, 65 39 Z" stroke="#10b981"
            stroke-width="1.8" stroke-linejoin="round" fill="none" />
          <path d="M65 37 C65 37, 72 37, 72 31 C72 28, 69 27, 65 33" stroke="#10b981" stroke-width="1.8"
            stroke-linejoin="round" fill="none" />

          <!-- "FARM" Text -->
          <text x="50" y="61" fill="#059669" font-family="'Inter', system-ui, sans-serif" font-weight="900"
            font-size="12.5" text-anchor="middle" letter-spacing="1">FARM</text>
        </svg>
      </div>
      <h2 class="text-2xl font-black text-slate-800 dark:text-white">Rejoindre KA Farm</h2>
      <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold max-w-xs mx-auto">
        Créez votre compte d'exploitant maraîcher pour travailler ensemble à distance.
      </p>
    </div>

    <!-- Form -->
    <form id="signup-form" class="space-y-4 text-xs font-semibold text-left">
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Nom
          Complet</label>
        <input type="text" id="signup-name" required placeholder="Ex: Seydou Ndiaye"
          class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Adresse
          Email</label>
        <input type="email" id="signup-email" required placeholder="votre-nom@gmail.com"
          class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Rôle /
          Localisation</label>
        <select id="signup-role" required
          class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
          <option value="Terrain">🌾 Terrain (Exploitation & Production)</option>
          <option value="Bureau">📊 Bureau (Gestion & Ventes)</option>
        </select>
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Mot de
          passe de sécurité</label>
        <input type="password" id="signup-password" required placeholder="Minimum 6 caractères"
          class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
      </div>

      <button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-emerald-950/20 text-sm mt-2">
        Créer mon compte d'exploitant
      </button>
    </form>

    <!-- Footer link -->
    <div class="text-center pt-2 border-t border-slate-150 dark:border-[#143E23]/30">
      <p class="text-[11px] text-slate-500 dark:text-slate-400 font-semibold">
        Déjà inscrit dans le réseau ?
        <a href="/pages/auth/login.html" class="text-emerald-600 dark:text-emerald-400 hover:underline font-bold">Se
          connecter</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { Router } from '/js/router.js';
    import { Auth } from '/js/auth.js';

    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const role = document.getElementById('signup-role').value;
      const pass = document.getElementById('signup-password').value;

      Auth.signup(name, email, role, pass, 'join', 'KA Farm', 'KA-FARM');
    });

    // Auto load icons
    lucide.createIcons();
  </script>
</body>

</html>
