<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - KA Farm</title>
  
  <!-- Tailwind CSS CDN & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom separated Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/auth.css">
  
  <script>
    try {
      const dark = localStorage.getItem('ka_farm_dark_mode') !== 'false';
      if (dark) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
      }
    } catch (e) {}

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#06130B',
              slate: '#0B2112',
              green: '#10B981',
              hover: '#059669',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-[#061109] text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

  <div class="w-full max-w-md bg-white dark:bg-[#0B2112] border border-slate-200 dark:border-[#143E23] rounded-3xl p-8 space-y-6 auth-card shadow-xl dark:shadow-none animate-scaleUp">
    <!-- Header -->
    <div class="text-center space-y-2">
      <div class="inline-flex h-12 w-12 bg-emerald-600 rounded-2xl items-center justify-center text-white shadow-lg shadow-emerald-950/20">
        <i data-lucide="sprout" class="h-6 w-6"></i>
      </div>
      <h2 class="text-2xl font-black text-slate-800 dark:text-white">Rejoindre KA Farm</h2>
      <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold max-w-xs mx-auto">
        Créez votre compte d'exploitant maraîcher pour travailler ensemble à distance.
      </p>
    </div>

    <!-- Form -->
    <form id="signup-form" class="space-y-4 text-xs font-semibold text-left">
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Nom Complet</label>
        <input type="text" id="signup-name" required placeholder="Ex: Aly KA" class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Adresse Email</label>
        <input type="email" id="signup-email" required placeholder="votre-nom@kafarm.sn" class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
      </div>

      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Rôle / Localisation</label>
        <select id="signup-role" required class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
          <option value="Terrain">🌾 Terrain (Exploitation & Production)</option>
          <option value="Bureau">📊 Bureau (Gestion & Ventes)</option>
        </select>
      </div>
      
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Mot de passe de sécurité</label>
        <input type="password" id="signup-password" required placeholder="Minimum 6 caractères" class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-3 text-slate-800 dark:text-slate-200 outline-none auth-input">
      </div>

      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-emerald-950/20 text-sm mt-2">
        Créer mon compte d'exploitant
      </button>
    </form>

    <!-- Footer link -->
    <div class="text-center pt-2 border-t border-slate-150 dark:border-[#143E23]/30">
      <p class="text-[11px] text-slate-500 dark:text-slate-400 font-semibold">
        Déjà inscrit dans le réseau familial ?
        <a href="/pages/auth/login.html" class="text-emerald-600 dark:text-emerald-400 hover:underline font-bold">Se connecter</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { Router } from '/js/router.js';
    import { Auth } from '/js/auth.js';

    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const role = document.getElementById('signup-role').value;
      const pass = document.getElementById('signup-password').value;
      
      Auth.signup(name, email, role, pass);
    });

    // Auto load icons
    lucide.createIcons();
  </script>
</body>
</html>
