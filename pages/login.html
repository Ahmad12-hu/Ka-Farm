<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Espace de Gestion KA Farm</title>
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#06130B',
                            slate: '#0B2112',
                            green: '#10B981',
                            hover: '#059669',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#061109] text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md mx-auto text-center">
        <a href="/index.html" class="inline-block mb-8">
            <div class="flex items-center gap-3">
                <div
                    class="h-12 w-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-emerald-950/40">
                    <i data-lucide="sprout" class="h-6 w-6"></i>
                </div>
                <div class="text-left">
                    <span class="block text-lg font-black uppercase tracking-wider text-white">KA Farm</span>
                    <span class="block text-[10px] font-bold text-emerald-400">SÉNÉGAL • AGROÉCOLOGIE</span>
                </div>
            </div>
        </a>

        <div class="bg-[#0B2112] border border-[#143E23]/40 rounded-3xl p-8 shadow-2xl text-left">
            <div class="mb-6">
                <h1 class="text-xl font-black text-white">Accès à l'Espace de Gestion</h1>
                <p class="text-xs text-[#819888] font-semibold mt-1">Veuillez vous authentifier pour piloter
                    l'exploitation.</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="space-y-2">
                    <label for="email" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Adresse
                        Email</label>
                    <div class="relative">
                        <i data-lucide="mail"
                            class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500"></i>
                        <input type="email" id="email" name="email" required placeholder="vous@kafarm.sn"
                            class="w-full bg-[#061109] border border-[#143E23]/60 rounded-xl px-4 py-3 pl-11 text-sm text-slate-200 outline-none placeholder:text-slate-600 focus:border-emerald-500 transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="password" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Mot de
                        passe</label>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500"></i>
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                            class="w-full bg-[#061109] border border-[#143E23]/60 rounded-xl px-4 py-3 pl-11 text-sm text-slate-200 outline-none placeholder:text-slate-600 focus:border-emerald-500 transition-all">
                    </div>
                </div>

                <div id="error-message"
                    class="hidden p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-xs text-rose-400 font-semibold">
                </div>

                <button type="submit" id="login-button"
                    class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-sm rounded-xl shadow-lg shadow-emerald-950/30 transition-all flex items-center justify-center gap-2 cursor-pointer">
                    <span id="login-button-text">Se Connecter</span>
                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                </button>
            </form>
        </div>

        <p class="text-xs text-slate-600 mt-8">
            © 2026 KA Farm Sénégal. Espace réservé à l'administration.
        </p>
    </div>

    <script type="module" src="/js/auth-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>

</html>
