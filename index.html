<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KA Farm Sénégal - Plateforme de Gestion Agricole & Agro-écologique</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="KA Farm Sénégal est l'outil innovant de pilotage et de gestion agro-écologique pour l'exploitation maraîchère familiale. Suivez parcelles, cultures, élevages, finances et stocks en temps réel.">
  <meta name="keywords"
    content="KA Farm, Sénégal, agriculture Sénégal, agro-écologie, maraîchage, gestion agricole, ferme Sénégal, suivi des parcelles, élevage Sénégal, outils agricoles, Amadou KA, agriculture intelligente">
  <meta name="author" content="KA Farm Sénégal">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kafarm.sn/">

  <!-- Favicon & Touch Icon -->
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kafarm.sn/">
  <meta property="og:title" content="KA Farm Sénégal - Plateforme de Gestion Agricole & Agro-écologique">
  <meta property="og:description"
    content="Pilotez votre exploitation maraîchère familiale avec précision. Suivi en temps réel des cultures, du bétail, des finances et des parcelles.">
  <meta property="og:image" content="https://kafarm.sn/assets/logo.svg">
  <meta property="og:site_name" content="KA Farm Sénégal">
  <meta property="og:locale" content="fr_FR">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="KA Farm Sénégal - Plateforme de Gestion Agricole & Agro-écologique">
  <meta name="twitter:description"
    content="Pilotez votre exploitation maraîchère familiale avec précision. Suivi en temps réel des cultures, du bétail, des finances et des parcelles.">
  <meta name="twitter:image" content="/assets/logo.svg">

  <!-- JSON-LD Structured Data for Search Engines -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "AgriculturalService",
    "name": "KA Farm Sénégal",
    "alternateName": "KA Farm",
    "description": "Exploitation maraîchère et agro-écologique familiale au Sénégal offrant des outils modernes de suivi de culture, élevage, finances et gestion de parcelles.",
    "url": "https://kafarm.sn/",
    "logo": "https://kafarm.sn/assets/logo.svg",
    "sameAs": [
      "https://facebook.com/kafarmsenegal"
    ],
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "SN",
      "addressLocality": "Dakar",
      "streetAddress": "Zone Maraîchère"
    },
    "founder": {
      "@type": "Person",
      "name": "Amadou KA"
    }
  }
  </script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script type="module">
    import { UserManager } from '/js/user-manager.js';
    import { KAStorage } from '/js/storage.js';

    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Default Storage Data if empty
      KAStorage.init();

      // Check user session - allow public/visitor access
      let user = UserManager.getCurrentUser();
      if (!user) {
        // Allow public access as guest visitor
        const guestUser = {
          email: 'guest@kafarm.sn',
          name: 'Visiteur',
          role: 'Invité',
          isGuest: true
        };
        KAStorage.setCurrentUser(guestUser, false);
        user = UserManager.getCurrentUser();
      }

      // Redirect to the dashboard (visitors can browse without account)
      setTimeout(() => {
        window.location.replace('/pages/shared/dashboard.html');
      }, 100);
    });
  </script>
</head>

<body class="bg-[#061109] min-h-screen flex items-center justify-center text-slate-100 font-semibold">
  <div class="text-center space-y-4 animate-pulse">
    <div
      class="inline-flex h-14 w-14 bg-emerald-600 rounded-2xl items-center justify-center text-white shadow-xl shadow-emerald-950/20">
      <svg class="h-8 w-8 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
      </svg>
    </div>
    <div class="space-y-1 text-xs">
      <p class="font-black text-white text-sm">Chargement de KA Farm...</p>
      <p class="text-slate-400">Synchronisation des données d'exploitation...</p>
    </div>
  </div>
</body>

</html>
