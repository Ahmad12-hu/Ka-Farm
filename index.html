<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KA Farm - Chargement...</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="module">
    import { UserManager } from '/js/user-manager.js';
    import { KAStorage } from '/js/storage.js';

    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Default Storage Data if empty
      KAStorage.init();

      // Check user session
      let user = UserManager.getCurrentUser();
      if (!user) {
        // Automatically log in as default user Amadou KA (amadoucoumbaka@gmail.com)
        KAStorage.setCurrentUser({
          email: 'amadoucoumbaka@gmail.com',
          name: 'Amadou KA',
          role: 'Bureau'
        }, true);
        user = UserManager.getCurrentUser();
      }
      
      // Redirect to the dashboard
      window.location.replace('/pages/shared/dashboard.html');
    });
  </script>
</head>
<body class="bg-[#061109] min-h-screen flex items-center justify-center text-slate-100 font-semibold">
  <div class="text-center space-y-4 animate-pulse">
    <div class="inline-flex h-14 w-14 bg-emerald-600 rounded-2xl items-center justify-center text-white shadow-xl shadow-emerald-950/20">
      <svg class="h-8 w-8 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>
    <div class="space-y-1 text-xs">
      <p class="font-black text-white text-sm">Chargement de KA Farm...</p>
      <p class="text-slate-400">Synchronisation des données d'exploitation...</p>
    </div>
  </div>
</body>
</html>
