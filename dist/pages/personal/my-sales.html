<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Ventes Terrain - KA Farm</title>

  <!-- Favicon & Branding -->
  <link rel="icon" type="image/svg+xml" href="/assets/logo-CVaPPC6u.svg">
  <link rel="apple-touch-icon" href="/assets/logo-CVaPPC6u.svg">

  <!-- Tailwind CSS CDN & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom separated Stylesheets -->

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#06130B',
              slate: '#0B2112',
              green: '#10B981',
              hover: '#059669',
            }
          }
        }
      }
    }
  </script>
  <script type="module" crossorigin src="/assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="/assets/auth-client-B3Q7K5VC.js"></script>
  <script type="module" crossorigin src="/assets/storage-C1IPJf-V.js"></script>
  <script type="module" crossorigin src="/assets/user-manager-ficPWetn.js"></script>
  <script type="module" crossorigin src="/assets/router-B_N331wq.js"></script>
  <script type="module" crossorigin src="/assets/app-DhSchYKj.js"></script>
  <script type="module" crossorigin src="/assets/personal-D4uZpO2N.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/auth-client-DWkViO4m.css">
  <link rel="stylesheet" crossorigin href="/assets/personal-BH3g78jL.css">
</head>

<body
  class="bg-slate-50 dark:bg-[#061109] text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200">

  <!-- Mobile Top Header Placeholder -->
  <div id="mobile-header-placeholder"></div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content Stage -->
    <main class="flex-1 min-w-0 p-4 md:p-8 overflow-y-auto">
      <div class="w-full space-y-6">

        <!-- Page Title & Header with Logo -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 text-left">
          <div class="flex items-start gap-4">
            <!-- Logo KA Farm -->
            <div
              class="h-16 w-16 bg-white dark:bg-[#0B2112] border-2 border-emerald-500/30 rounded-2xl flex items-center justify-center shadow-lg flex-shrink-0">
              <svg class="w-10 h-10" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 12 C70 12, 82 15, 82 34 C82 52, 70 66, 50 75 C30 66, 18 52, 18 34 C18 15, 30 12, 50 12 Z"
                  stroke="#10b981" stroke-width="2.5" stroke-linejoin="round" fill="none" />
                <path d="M50 15 C67 15, 78 18, 78 34 C78 50, 67 63, 50 71 C33 63, 22 50, 22 34 C22 18, 33 15, 50 15 Z"
                  stroke="#10b981" stroke-width="1" stroke-linejoin="round" fill="none" />
                <path d="M29 29 V46 M29 37 L38 29 M32 39 L39 46" stroke="#10b981" stroke-width="3.5"
                  stroke-linecap="round" stroke-linejoin="round" />
                <path d="M44 46 L49 29 L54 46 M46 41 H52" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"
                  stroke-linejoin="round" />
                <path d="M59 46 H71" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
                <path d="M65 46 V39" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
                <path d="M65 39 C61 39, 58 36, 58 33 C58 30, 61 29, 65 33 C65 33, 65 39, 65 39 Z" stroke="#10b981"
                  stroke-width="1.8" stroke-linejoin="round" fill="none" />
                <path d="M65 37 C65 37, 72 37, 72 31 C72 28, 69 27, 65 33" stroke="#10b981" stroke-width="1.8"
                  stroke-linejoin="round" fill="none" />
                <text x="50" y="61" fill="#059669" font-family="'Inter', system-ui, sans-serif" font-weight="900"
                  font-size="12.5" text-anchor="middle" letter-spacing="1">FARM</text>
              </svg>
            </div>
            <div class="space-y-1">
              <span class="text-[10px] text-emerald-500 font-extrabold uppercase tracking-widest">Espace
                Personnel</span>
              <h2 class="text-2xl font-black text-slate-850 dark:text-white flex items-center gap-2">
                🚚 BON DE LIVRAISON & REÇU
              </h2>
              <p class="text-xs text-slate-500 dark:text-slate-400 font-semibold">
                Enregistrez vos ventes maraîchères avec traçabilité complète
              </p>
            </div>
          </div>
          <button onclick="document.getElementById('sale-form-modal').classList.remove('hidden')"
            class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold text-xs rounded-xl shadow-lg transition-all cursor-pointer flex items-center gap-2">
            <i data-lucide="plus" class="h-3.5 w-3.5"></i> Nouvelle Vente
          </button>
        </div>

        <!-- Sales Listings with Enhanced Style -->
        <div class="space-y-4">
          <!-- Sales Container -->
          <div
            class="bg-white dark:bg-[#0B2112] border-2 border-slate-200 dark:border-[#143E23]/40 rounded-3xl overflow-hidden shadow-xl">
            <!-- Header du journal -->
            <div
              class="bg-gradient-to-r from-emerald-600 to-emerald-700 dark:from-emerald-700 dark:to-emerald-800 px-6 py-4 border-b border-emerald-500/30">
              <div class="flex items-center justify-between">
                <div>
                  <h3 class="text-sm font-black text-white uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="receipt" class="h-4 w-4"></i>
                    Journal des Ventes Maraîchères
                  </h3>
                  <p class="text-[10px] text-emerald-100 font-semibold mt-0.5">KA Farm - Zone Maraîchère, Sénégal</p>
                </div>
                <div class="text-right">
                  <p class="text-[9px] text-emerald-200 font-bold uppercase">Référence</p>
                  <p class="text-xs font-black text-white font-mono" id="sales-reference">F-2026</p>
                </div>
              </div>
            </div>

            <!-- Sales List -->
            <div class="p-6 space-y-3" id="my-sales-container">
              <!-- Dynamically populated via personal.js -->
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Dialog for logging a sale -->
  <div id="sale-form-modal"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 hidden animate-fadeIn">
    <div
      class="w-full max-w-md bg-white dark:bg-[#0B2112] border border-slate-200 dark:border-[#143E23]/60 rounded-3xl p-6 text-left shadow-2xl space-y-4">
      <div class="flex justify-between items-center">
        <h3 class="text-sm font-black text-slate-800 dark:text-white uppercase tracking-wider flex items-center gap-2">
          <i data-lucide="plus-circle" class="h-4 w-4 text-emerald-500"></i> Noter une Vente de Récolte
        </h3>
        <button onclick="document.getElementById('sale-form-modal').classList.add('hidden')"
          class="text-slate-400 hover:text-slate-200 cursor-pointer">
          <i data-lucide="x" class="h-5 w-5"></i>
        </button>
      </div>

      <form id="personal-sale-form" class="space-y-4 text-xs font-semibold">
        <div class="space-y-1">
          <label
            class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Désignation</label>
          <input type="text" id="personal-sale-desc" required placeholder="Ex: Vente de 3 paniers de tomates"
            class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-2.5 text-slate-800 dark:text-slate-200 outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label
              class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Catégorie</label>
            <select id="personal-sale-category"
              class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-2.5 text-slate-800 dark:text-slate-200 outline-none">
              <option value="Vente Légumes" selected>🍅 Vente Légumes</option>
              <option value="Aromates">🌿 Aromates & Fines herbes</option>
              <option value="Pépinières">🌱 Jeunes Plants</option>
              <option value="Autres">📦 Autres productions</option>
            </select>
          </div>

          <div class="space-y-1">
            <label
              class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Montant
              (FCFA)</label>
            <input type="number" id="personal-sale-amount" required placeholder="Ex: 45000"
              class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-2.5 text-slate-800 dark:text-slate-200 outline-none">
          </div>
        </div>

        <div class="space-y-1">
          <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Date de
            la Vente</label>
          <input type="date" id="personal-sale-date" required
            class="w-full bg-slate-50 dark:bg-[#0D2615] border border-slate-200 dark:border-[#1A4525] rounded-xl px-4 py-2.5 text-slate-800 dark:text-slate-200 outline-none">
        </div>

        <button type="submit" onclick="document.getElementById('sale-form-modal').classList.add('hidden')"
          class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-emerald-950/20 text-xs">
          Enregistrer la vente maraîchère
        </button>
      </form>
    </div>
  </div>

  <!-- Shared App & Personal Module Entry Points -->

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const todayStr = new Date().toISOString().split('T')[0];
      const saleDateInput = document.getElementById('personal-sale-date');
      if (saleDateInput) saleDateInput.value = todayStr;
    });
  </script>
</body>

</html>
