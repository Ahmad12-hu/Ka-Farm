<!DOCTYPE html>
<html lang="fr">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="bg-[#0f1a0b] min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/index.html" class="inline-flex items-center gap-3">
                <div
                    class="h-16 w-16 bg-white/5 p-2 rounded-2xl border border-[#162010] flex items-center justify-center">
                    <svg class="w-full h-full" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M50 12 C70 12, 82 15, 82 34 C82 52, 70 66, 50 75 C30 66, 18 52, 18 34 C18 15, 30 12, 50 12 Z"
                            stroke="#7ec850" stroke-width="2" stroke-linejoin="round" fill="none" />
                        <path d="M29 29 V46 M29 37 L38 29 M32 39 L39 46" stroke="#7ec850" stroke-width="3.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M44 46 L49 29 L54 46 M46 41 H52" stroke="#7ec850" stroke-width="3.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M59 46 H71" stroke="#7ec850" stroke-width="2" stroke-linecap="round" />
                        <path d="M65 46 V39" stroke="#7ec850" stroke-width="2" stroke-linecap="round" />

                            font-weight="900" font-size="12.5" text-anchor="middle" letter-spacing="1">FARM</text>
                    </svg>
                </div>
                <div class="text-left">
                    <h1 class="text-2xl font-black text-white tracking-tight">KA FARM</h1>
                    <p class="text-xs text-[#7ec850] font-bold">Espace Administrateur</p>
                </div>
            </a>
        </div>

        <!-- Login Card -->
        <div class="bg-[#162010] border border-[#2a3f1f] rounded-2xl p-8 shadow-2xl">
            <div class="mb-6">
                <h2 class="text-xl font-black text-white mb-2">Connexion Admin</h2>
                <p class="text-sm text-[#7ec850]/70">Accès réservé au propriétaire de l'entreprise</p>
            </div>

            <form id="login-form" class="space-y-4">
                <!-- Email -->
                <div>
                    <label class="block text-xs font-bold text-white mb-2">Email</label>
                    <input type="email" id="email" required placeholder="admin@kafarm.sn"
                        class="w-full px-4 py-3 bg-[#0f1a0b] border border-[#2a3f1f] rounded-xl text-white text-sm focus:outline-none focus:border-[#7ec850] focus:ring-1 focus:ring-[#7ec850] transition-all">
                </div>

                <!-- Mot de passe -->
                <div>
                    <label class="block text-xs font-bold text-white mb-2">Mot de passe</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 bg-[#0f1a0b] border border-[#2a3f1f] rounded-xl text-white text-sm focus:outline-none focus:border-[#7ec850] focus:ring-1 focus:ring-[#7ec850] transition-all">
                </div>

                <!-- Error Message -->
                <div id="error-message"
                    class="hidden bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl text-sm">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-[#7ec850] hover:bg-[#6bb340] text-[#0f1a0b] font-black py-3 px-6 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-[#7ec850]/20">
                    Se Connecter
                </button>
            </form>

            <!-- Back to site -->
            <div class="mt-6 pt-6 border-t border-[#2a3f1f] text-center">
                <a href="/index.html" class="text-sm text-[#7ec850]/70 hover:text-[#7ec850] transition-colors">
                    ← Retour au site
                </a>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-[#7ec850]/50 mt-6">
            KA Farm Admin v1.0 • Accès restreint
        </p>
    </div>

</body>

</html>
